<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-band">
        <div>
          <p class="site-kicker">Research paper</p>
          <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
        </div>
        <p class="site-tagline">{{ site.description }}</p>
      </div>

      <nav class="page-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}" class="nav-link{% if page.permalink == '/' %} active{% endif %}">
          <span class="nav-num">01</span> Paper
        </a>
        <a href="{{ '/paper_technical/' | relative_url }}" class="nav-link{% if page.permalink == '/paper_technical/' %} active{% endif %}">
          <span class="nav-num">02</span> Reader Guide
        </a>
        <a href="{{ '/paper_appendix/' | relative_url }}" class="nav-link{% if page.permalink == '/paper_appendix/' %} active{% endif %}">
          <span class="nav-num">03</span> Evidence Appendix
        </a>
      </nav>
    </header>

    <main class="page-main">
      <article class="paper-frame{% if page.permalink != '/' %} is-support{% endif %}">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <p>Maintained by <a href="https://github.com/jguida941">jguida941</a>.</p>
      <p class="footer-sub">All quantitative claims in the paper are dated because the repository continues to evolve.</p>
    </footer>
  </div>
</body>
</html>
