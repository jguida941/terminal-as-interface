<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Terminal control loop</title>
  <desc id="desc">A flow diagram showing how human intent, AI agents, project checks, and human review interact in a terminal workflow.</desc>
  <rect width="1200" height="720" fill="#f7f3ea"/>
  <text x="600" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#1f2430">Terminal Control Loop</text>
  <text x="600" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5a6170">Human policy and machine output meet in the same command surface</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#1f2430" text-anchor="middle">
    <rect x="350" y="150" width="500" height="72" rx="18" fill="#dce9f5" stroke="#577590" stroke-width="3"/>
    <text x="600" y="195">Human states intent</text>

    <line x1="600" y1="222" x2="600" y2="262" stroke="#1f2430" stroke-width="3"/>
    <polygon points="600,280 589,260 611,260" fill="#1f2430"/>

    <rect x="350" y="280" width="500" height="72" rx="18" fill="#efe3cf" stroke="#b08968" stroke-width="3"/>
    <text x="600" y="325">AI agent reads files and edits code</text>

    <line x1="600" y1="352" x2="600" y2="392" stroke="#1f2430" stroke-width="3"/>
    <polygon points="600,410 589,390 611,390" fill="#1f2430"/>

    <rect x="350" y="410" width="500" height="72" rx="18" fill="#d7eadf" stroke="#4d8061" stroke-width="3"/>
    <text x="600" y="455">Repository checks return pass or fail</text>

    <line x1="600" y1="482" x2="600" y2="522" stroke="#1f2430" stroke-width="3"/>
    <polygon points="600,540 589,520 611,520" fill="#1f2430"/>

    <rect x="350" y="540" width="500" height="72" rx="18" fill="#f3d7db" stroke="#a64d79" stroke-width="3"/>
    <text x="600" y="585">Human accepts, rejects, or redirects</text>
  </g>

  <path d="M850 446 C980 446 1010 320 905 250" fill="none" stroke="#1f2430" stroke-width="3"/>
  <polygon points="893,259 915,251 900,274" fill="#1f2430"/>
  <text x="1010" y="380" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1f2430">Failure leads to revision</text>
</svg>
