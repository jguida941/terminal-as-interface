<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">VoiceTerm control plane map</title>
  <desc id="desc">A split-panel system map showing the Rust runtime and overlay on one side and the Python devctl control plane, check scripts, workflows, telemetry, and publication sync on the other, with arrows connecting both halves.</desc>
  <rect width="1200" height="860" fill="#f7f3ea"/>

  <text x="600" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#1f2430">VoiceTerm Control Plane Map</text>
  <text x="600" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5a6170">The project is a runtime written in Rust and a governance layer written largely in Python, joined by the same terminal workflow</text>

  <rect x="64" y="154" width="432" height="616" rx="28" fill="#fbf8f2" stroke="#577590" stroke-width="3"/>
  <rect x="704" y="154" width="432" height="616" rx="28" fill="#fbf8f2" stroke="#4d8061" stroke-width="3"/>
  <rect x="514" y="222" width="172" height="476" rx="24" fill="#f1ece3" stroke="#b8b0a2" stroke-width="2.5"/>

  <g font-family="Georgia, serif" fill="#1f2430">
    <text x="280" y="210" text-anchor="middle" font-size="32">Rust runtime surface</text>
    <text x="920" y="210" text-anchor="middle" font-size="32">Python control plane</text>
    <text x="600" y="266" text-anchor="middle" font-size="27">Shared repo state</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" fill="#1f2430">
    <text x="280" y="240" text-anchor="middle" font-size="18" fill="#5a6170">audio, wake, PTY, overlay, runtime behavior</text>
    <text x="920" y="240" text-anchor="middle" font-size="18" fill="#5a6170">routing, checks, workflows, telemetry, publication governance</text>
    <text x="600" y="292" text-anchor="middle" font-size="16" fill="#5a6170">git history, paths, plans, and evidence</text>

    <rect x="104" y="278" width="352" height="102" rx="20" fill="#f3d7db" stroke="#a64d79" stroke-width="3"/>
    <text x="280" y="314" text-anchor="middle" font-size="27">Audio and speech path</text>
    <text x="280" y="342" text-anchor="middle" font-size="19">wake word, VAD, STT, transcripts</text>
    <text x="280" y="368" text-anchor="middle" font-size="19">mic input becomes terminal-ready text</text>

    <rect x="104" y="410" width="352" height="102" rx="20" fill="#dce9f5" stroke="#577590" stroke-width="3"/>
    <text x="280" y="446" text-anchor="middle" font-size="27">Overlay and PTY session</text>
    <text x="280" y="474" text-anchor="middle" font-size="19">HUD, command surface, terminal restore</text>
    <text x="280" y="500" text-anchor="middle" font-size="19">human and agent share one shell view</text>

    <rect x="104" y="542" width="352" height="132" rx="20" fill="#efe3cf" stroke="#b08968" stroke-width="3"/>
    <text x="280" y="578" text-anchor="middle" font-size="27">Runtime code paths</text>
    <text x="280" y="606" text-anchor="middle" font-size="19">`rust/src/bin/voiceterm/**`</text>
    <text x="280" y="632" text-anchor="middle" font-size="19">latency, parser, safety, UI behavior, tests</text>
    <text x="280" y="658" text-anchor="middle" font-size="19">the product people actually run</text>

    <rect x="744" y="264" width="352" height="94" rx="20" fill="#dce9f5" stroke="#577590" stroke-width="3"/>
    <text x="920" y="300" text-anchor="middle" font-size="26">`devctl` and bundle registry</text>
    <text x="920" y="327" text-anchor="middle" font-size="19">task routing, check profiles, automation entrypoints</text>

    <rect x="744" y="384" width="352" height="102" rx="20" fill="#d7eadf" stroke="#4d8061" stroke-width="3"/>
    <text x="920" y="420" text-anchor="middle" font-size="26">Guard scripts</text>
    <text x="920" y="448" text-anchor="middle" font-size="19">`dev/scripts/checks/check_*.py`</text>
    <text x="920" y="474" text-anchor="middle" font-size="19">parity, panic policy, workflow hygiene, security</text>

    <rect x="744" y="512" width="352" height="102" rx="20" fill="#eadcf5" stroke="#7b5ea7" stroke-width="3"/>
    <text x="920" y="548" text-anchor="middle" font-size="26">CI and release workflows</text>
    <text x="920" y="576" text-anchor="middle" font-size="19">core quality, tooling policy, triage, publish</text>
    <text x="920" y="602" text-anchor="middle" font-size="19">the same rules run again in GitHub Actions</text>

    <rect x="744" y="640" width="352" height="106" rx="20" fill="#f3d7db" stroke="#a64d79" stroke-width="3"/>
    <text x="920" y="676" text-anchor="middle" font-size="26">Telemetry and publication sync</text>
    <text x="920" y="704" text-anchor="middle" font-size="19">triage bundles, audit metrics, external paper drift checks</text>
    <text x="920" y="730" text-anchor="middle" font-size="19">repo evidence leaves the codebase in a governed form</text>

    <rect x="540" y="322" width="120" height="76" rx="18" fill="#ffffff" stroke="#b8b0a2" stroke-width="2"/>
    <text x="600" y="350" text-anchor="middle" font-size="17">terminal</text>
    <text x="600" y="373" text-anchor="middle" font-size="17">session</text>

    <rect x="540" y="430" width="120" height="76" rx="18" fill="#ffffff" stroke="#b8b0a2" stroke-width="2"/>
    <text x="600" y="458" text-anchor="middle" font-size="17">task router</text>
    <text x="600" y="481" text-anchor="middle" font-size="17">and bundles</text>

    <rect x="540" y="538" width="120" height="76" rx="18" fill="#ffffff" stroke="#b8b0a2" stroke-width="2"/>
    <text x="600" y="566" text-anchor="middle" font-size="17">checks and</text>
    <text x="600" y="589" text-anchor="middle" font-size="17">workflow state</text>
  </g>

  <g stroke="#1f2430" stroke-width="3" fill="#1f2430">
    <line x1="456" y1="328" x2="522" y2="360"/>
    <polygon points="518,345 538,368 509,365"/>
    <line x1="744" y1="312" x2="678" y2="360"/>
    <polygon points="683,345 662,372 676,344"/>

    <line x1="456" y1="462" x2="522" y2="468"/>
    <polygon points="505,456 540,470 504,478"/>
    <line x1="744" y1="438" x2="678" y2="468"/>
    <polygon points="686,451 662,475 676,445"/>

    <line x1="456" y1="608" x2="522" y2="576"/>
    <polygon points="508,571 538,568 517,588"/>
    <line x1="744" y1="564" x2="678" y2="576"/>
    <polygon points="692,559 662,579 689,581"/>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f2430">
    <text x="600" y="182" text-anchor="middle">Both sides operate on the same repo and terminal history</text>
    <text x="600" y="792" text-anchor="middle">Runtime edits trigger Python guardrails; Python guardrails steer runtime edits, CI outcomes, and the public paper</text>
  </g>

  <path d="M1096 692 C1148 692 1158 230 972 230" fill="none" stroke="#1f2430" stroke-width="3"/>
  <polygon points="980,216 956,231 982,240" fill="#1f2430"/>
  <text x="1138" y="472" transform="rotate(90 1138 472)" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f2430">policy and evidence flow back into development</text>
</svg>
